<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8eef8" />
  <title>Attendance — Gen Alpha Cricket Academy</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/gen-alpha-favicon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/glass.css?v=6" />
  <script>document.documentElement.dataset.theme = localStorage.getItem("ga-theme") || "light"; document.documentElement.classList.add("ga-js");</script>
  <style>
    .att-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .att-toolbar .search { flex: 1; min-width: 200px; }
    .att-toolbar input[type="date"] { width: auto; }
    .att-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .att-card {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 16px; border-radius: var(--r-lg); cursor: pointer; user-select: none;
      border: 1px solid var(--tile-border);
      background: var(--tile-bg);
      -webkit-backdrop-filter: blur(16px) saturate(160%); backdrop-filter: blur(16px) saturate(160%);
      box-shadow: var(--glass-shadow-soft);
      transition: transform .35s var(--ease-spring), border-color .25s ease, background .3s ease, box-shadow .3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .att-card:active { transform: scale(0.97); }
    .att-card .nm { font-weight: 650; font-size: 14.5px; }
    .att-card .sl { font-size: 11.5px; color: var(--ink-low); }
    .att-card .mark {
      width: 30px; height: 30px; flex: none; border-radius: 50%;
      border: 2px solid var(--dot-border); display: grid; place-items: center;
      transition: all .3s var(--ease-spring); color: transparent; font-size: 15px; font-weight: 800;
    }
    .att-card.present {
      border-color: rgba(74,222,128,0.5);
      background: linear-gradient(135deg, rgba(74,222,128,0.16), rgba(74,222,128,0.05));
      box-shadow: 0 10px 30px rgba(74,222,128,0.12), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .att-card.present .mark {
      border-color: transparent; color: #06250f;
      background: linear-gradient(135deg, #6ef0a0, var(--green-400));
      box-shadow: 0 4px 14px rgba(74,222,128,0.45);
    }
    .att-summary { display: flex; gap: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main class="ga-page">
    <section class="glass glass-card reveal">
      <div class="card-head">
        <div>
          <p class="kicker">Daily training</p>
          <h2>Attendance</h2>
          <p class="sub">Tap a player to mark present. Tap again to undo — no stress if you tap the wrong name.</p>
        </div>
        <div class="att-summary">
          <span class="pill green" id="presentPill">0 present</span>
          <span class="pill" id="totalPill">0 players</span>
        </div>
      </div>

      <div class="att-toolbar">
        <input type="search" class="search" id="searchInput" placeholder="Search player…" />
        <input type="date" id="attDate" />
        <div class="chip-row" id="slotChips"></div>
      </div>

      <div class="att-grid mt-3" id="attGrid"></div>
      <div id="emptyState" class="empty-state hide">No active players match this filter.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/config.js?v=1"></script>
  <script src="assets/js/core.js?v=6"></script>
  <script src="assets/js/pages/attendance.js?v=1"></script>
</body>
</html>
